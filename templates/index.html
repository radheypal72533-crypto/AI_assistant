<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>AI Assistant</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>
    <div>
        <h1 class="main-heading">AI Personal Assistant</h1>

        <h2>Ask Anything</h2>
        <form id="askForm">
            <input type="text" name="question" placeholder="Ask anything..." required>
            <button type="submit">Ask</button>
        </form>

        <p id="ans-loading" style="display:none;">Processing...</p>
        <p id="answer"></p>

        <hr>

        <h2>Summarize Email</h2>
        <form id="emailForm">
            <textarea name="email" placeholder="Paste email here..." required></textarea>
            <button type="submit">Summarize</button>
        </form>

        <p id="summary-loading" style="display:none;">Processing...</p>
        <p id="summary"></p>
    </div>
    <script>
        document.getElementById("askForm").onsubmit = async (e) => {
            e.preventDefault();

            let formData = new FormData(e.target);
            let loading = document.getElementById("ans-loading");
            loading.style.display = "block";

            let res = await fetch("/ask", {
                method: "POST",
                body: formData
            });

            let data = await res.json();
            console.log(data);

            document.getElementById("answer").innerText =
                data.response || data.error || "Something went wrong";

            loading.style.display = "none";
        };

        document.getElementById("emailForm").onsubmit = async (e) => {
            e.preventDefault();

            let formData = new FormData(e.target);
            let loading = document.getElementById("summary-loading");
            loading.style.display = "block";

            let res = await fetch("/summarize", {
                method: "POST",
                body: formData
            });

            let data = await res.json();
            console.log(data);

            document.getElementById("summary").innerText =
                data.response || data.error || "Something went wrong";

            loading.style.display = "none";
        };
    </script>

</body>

</html>
